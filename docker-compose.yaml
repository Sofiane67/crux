services:
  postgres:
    image: postgres:17-alpine
    container_name: crux-postgres
    restart: unless-stopped
    ports:
      - "5440:5432"
    environment:
      POSTGRES_DB: crux
      POSTGRES_USER: crux
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - crux_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crux -d crux"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    container_name: crux-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  crux_pg_data: